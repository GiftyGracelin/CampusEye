<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="sidebar">
<h2>Student</h2>
<button onclick="scrollToSection('homeSection')">Home</button>
<button onclick="scrollToSection('attendanceSection')">Attendance</button>
<button onclick="scrollToSection('behaviourSection')">Behaviour</button>
<button onclick="scrollToSection('leaveSection')">Leave</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">
<section id="homeSection" class="section">
<div class="card" id="homeInfo"></div>
</section>

<section id="attendanceSection" class="section">
<h2>Attendance</h2>
<div class="card attendance-card">
  <div class="attendance-controls">
    <label>Month:
      <select id="attendanceMonth" onchange="loadAttendanceMonth()"></select>
    </label>
    <label>Year:
      <select id="attendanceYear" onchange="loadAttendanceMonth()"></select>
    </label>
  </div>
  <canvas id="attendanceChart" height="150"></canvas>
  <div id="attendanceStats" class="attendance-summary"></div>
</div>
</section>

<section id="behaviourSection" class="section">
<h2>Behaviour Calendar</h2>
<div class="card calendar-card">
  <div class="calendar-controls">
    <label>Month:
      <select id="behaviourMonth" onchange="loadBehaviourCalendar()"></select>
    </label>
    <label>Year:
      <select id="behaviourYear" onchange="loadBehaviourCalendar()"></select>
    </label>
  </div>
</div>
<div id="calendar" class="calendar-grid"></div>
<div id="calendarSummary" class="card"></div>
</section>

<section id="leaveSection" class="section">
<div class="card">
<textarea id="reason" placeholder="Enter leave reason"></textarea>
<button onclick="leave()">Send Leave Request</button>
</div>
<div id="leaveHistory" class="card"></div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
